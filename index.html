<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>F1 Clash Resource Sheet</title>
<meta name="description" content="Offline tracker for F1 Clash driver and component levels and card counts.">
<meta name="theme-color" content="#0b0f1a">
<meta name="color-scheme" content="dark light">
<link rel="manifest" href="manifest.webmanifest">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 Clash">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0b0f1a; --surface:#141a29; --surface-2:#1c2436; --line:#2a3348;
    --text:#eaf0ff; --muted:#9aa6c2; --red:#e10600; --red-ink:#ffffff;
    --accent:#3aa0ff; --ok:#37d38a; --gold:#ffcf4d;
    --common:#8fb4d6; --rare:#4d8bff; --epic:#b06bff; --legendary:#ffcf4d;
    --radius:14px; --tap:42px;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left); --safe-r:env(safe-area-inset-right);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#eef1f7; --surface:#ffffff; --surface-2:#f2f5fb; --line:#d7deec;
      --text:#101625; --muted:#556080;
      --common:#3f6f9c; --rare:#2f5fd0; --epic:#7d3fd0; --legendary:#b8860b;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.4 system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%; overflow-x:hidden;
    padding:0 var(--safe-r) var(--safe-b) var(--safe-l);
  }
  button{font:inherit; color:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent}
  input{font:inherit}

  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, rgba(11,15,26,.98), rgba(11,15,26,.94));
    backdrop-filter:saturate(1.2) blur(6px);
    border-bottom:1px solid var(--line);
    padding:calc(var(--safe-t) + 10px) 12px 8px;
  }
  @media (prefers-color-scheme: light){
    header{background:linear-gradient(180deg, rgba(238,241,247,.98), rgba(238,241,247,.94))}
  }
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .logo{
    width:30px; height:30px; border-radius:8px; background:var(--red);
    display:grid; place-items:center; flex:0 0 auto;
  }
  .logo svg{width:18px; height:18px}
  .title{font-weight:800; letter-spacing:.2px; font-size:18px; flex:1 1 auto;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .title small{display:block; font-weight:600; font-size:11px; color:var(--muted)}
  #install{
    display:none; border:1px solid var(--line); background:var(--surface-2);
    border-radius:10px; padding:8px 12px; min-height:var(--tap); font-weight:700; font-size:13px;
  }
  #install:active{transform:scale(.96)}
  #install.show{display:inline-flex; align-items:center; gap:6px}

  .search{
    display:flex; align-items:center; gap:8px; background:var(--surface);
    border:1px solid var(--line); border-radius:12px; padding:0 10px; margin-bottom:8px;
  }
  .search svg{width:16px;height:16px;opacity:.7;flex:0 0 auto}
  .search input{
    flex:1; background:transparent; border:0; outline:none; color:var(--text);
    padding:11px 2px; min-height:var(--tap);
  }
  .search .clear{
    border:0;background:transparent;color:var(--muted);font-size:20px;line-height:1;
    padding:6px 4px;min-width:32px;
  }

  .tabs{display:flex; gap:6px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:4px}
  .tabs button{
    flex:1; border:0; background:transparent; border-radius:9px; padding:10px;
    min-height:var(--tap); font-weight:700; color:var(--muted);
  }
  .tabs button[aria-selected="true"]{background:var(--red); color:var(--red-ink)}
  .tabs button:active{transform:scale(.98)}

  .chips{
    display:flex; gap:8px; overflow-x:auto; padding:10px 12px; margin:0;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
    position:sticky; top:0; z-index:10;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; border:1px solid var(--line); background:var(--surface);
    color:var(--muted); border-radius:999px; padding:8px 14px; min-height:38px;
    font-size:13px; font-weight:700; white-space:nowrap;
  }
  .chip[aria-pressed="true"]{background:var(--surface-2); color:var(--text); border-color:var(--accent)}
  .chip:active{transform:scale(.96)}

  main{padding:4px 12px 28px; max-width:760px; margin:0 auto}
  .group{margin:14px 0 4px}
  .group h2{
    display:flex; align-items:center; gap:8px; font-size:13px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--muted); margin:0 2px 8px; font-weight:800;
  }
  .group h2 .count{margin-left:auto; font-weight:700; color:var(--muted)}
  .cards{display:grid; grid-template-columns:1fr; gap:10px}
  @media (min-width:520px){.cards{grid-template-columns:1fr 1fr}}

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:12px; display:flex; flex-direction:column; gap:10px;
  }
  .card.dim{opacity:.55}
  .card .top{display:flex; align-items:center; gap:8px}
  .name{font-weight:800; font-size:16px; flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .badge{
    font-size:10px; font-weight:900; letter-spacing:.06em; text-transform:uppercase;
    padding:3px 8px; border-radius:999px; color:#0b0f1a; flex:0 0 auto;
  }
  .badge.Common{background:var(--common)}
  .badge.Rare{background:var(--rare); color:#fff}
  .badge.Epic{background:var(--epic); color:#fff}
  .badge.Legendary{background:var(--legendary)}

  .row{display:flex; align-items:center; gap:10px}
  .lvl{display:flex; align-items:center; gap:8px}
  .step{
    width:var(--tap); height:var(--tap); border-radius:10px; border:1px solid var(--line);
    background:var(--surface-2); font-size:22px; font-weight:800; display:grid; place-items:center;
  }
  .step:active{transform:scale(.94); background:var(--red); color:var(--red-ink)}
  .step[disabled]{opacity:.35; pointer-events:none}
  .lvlnum{min-width:78px; text-align:center}
  .lvlnum b{font-size:20px}
  .lvlnum small{display:block; font-size:10px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase}

  .amt{margin-left:auto; display:flex; align-items:center; gap:6px}
  .amt label{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .amt input{
    width:88px; text-align:right; background:var(--surface-2); color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:9px 10px; min-height:var(--tap);
  }
  .amt input:focus{outline:2px solid var(--accent); outline-offset:1px}

  .bar{height:8px; border-radius:999px; background:var(--surface-2); overflow:hidden; border:1px solid var(--line)}
  .bar>i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--ok)); transition:width .18s ease}
  .barwrap{display:flex; flex-direction:column; gap:5px}
  .barlabel{display:flex; justify-content:space-between; font-size:11px; color:var(--muted)}
  .maxrow{display:flex; align-items:center; gap:6px; color:var(--gold); font-weight:800; font-size:13px}
  .maxrow .trade{
    color:var(--gold); font-weight:800; font-size:11px; letter-spacing:.02em;
    background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:2px 8px;
  }
  .muted{color:var(--muted)} .small{font-size:12px} .gold{color:var(--gold)}

  /* collapsible stats & costs panel */
  details.det{border-top:1px solid var(--line); margin-top:2px; padding-top:8px}
  details.det>summary{
    list-style:none; cursor:pointer; color:var(--muted); font-size:12px; font-weight:700;
    display:flex; align-items:center; gap:6px; min-height:32px; user-select:none;
  }
  details.det>summary::-webkit-details-marker{display:none}
  details.det>summary::before{content:"▸"; transition:transform .15s}
  details.det[open]>summary::before{transform:rotate(90deg)}
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:4px 14px; margin:8px 0 4px}
  .stat{display:flex; justify-content:space-between; font-size:12px; color:var(--muted)}
  .stat b{color:var(--text); font-weight:700}
  .stat.total{grid-column:1 / -1; border-top:1px dashed var(--line); padding-top:6px; margin-top:2px}
  .plan{margin-top:6px}
  .planrow{display:flex; justify-content:space-between; gap:10px; font-size:12px; color:var(--muted)}
  .planrow b{color:var(--text); font-weight:700; text-align:right}

  /* collection "to max" summary banner */
  .summary{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:10px 12px; margin:12px 0 2px;
  }
  .sum-title{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:800; margin-bottom:8px}
  .sum-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
  .sum{display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:10px; padding:8px 4px}
  .sum b{font-size:17px; font-weight:800}
  .sum small{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em}
  .sum-trade{margin-top:10px; padding-top:8px; border-top:1px dashed var(--line);
    font-size:12px; color:var(--muted); text-align:center}
  .sum-trade b{color:var(--gold); font-weight:800}

  .toolbar{
    display:flex; gap:8px; flex-wrap:wrap; margin:16px 2px 4px;
  }
  .toolbar button{
    flex:1 1 auto; min-width:96px; min-height:var(--tap);
    border:1px solid var(--line); background:var(--surface); border-radius:12px;
    padding:10px; font-weight:700; font-size:13px;
  }
  .toolbar button:active{transform:scale(.98)}
  .toolbar button.danger{color:var(--red); border-color:var(--red)}
  .empty{text-align:center; color:var(--muted); padding:40px 10px}

  footer{color:var(--muted); font-size:11px; text-align:center; padding:18px 12px 30px; line-height:1.6}
  .toast{
    position:fixed; left:50%; bottom:calc(20px + var(--safe-b)); transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); color:var(--text); border:1px solid var(--line);
    padding:10px 16px; border-radius:12px; font-size:14px; font-weight:600;
    opacity:0; pointer-events:none; transition:.22s; z-index:50; max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* ---------- Season dashboard ---------- */
  .season{display:flex; flex-direction:column; gap:12px; margin-top:12px}
  .panel{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:12px;
  }
  .panel > h3{
    margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); font-weight:800;
  }
  .panel > h3 .hint{float:right; text-transform:none; letter-spacing:0; font-weight:600; color:var(--muted)}

  /* countdown */
  .countdown{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .cd-big{display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--surface-2); border:1px solid var(--line); border-radius:12px;
    padding:10px 16px; min-width:96px}
  .cd-big b{font-size:30px; font-weight:900; line-height:1; color:var(--gold)}
  .cd-big small{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:4px}
  .cd-dates{flex:1 1 180px; display:flex; flex-direction:column; gap:8px}
  .cd-date{display:flex; align-items:center; gap:8px; justify-content:space-between}
  .cd-date label{font-size:12px; color:var(--muted); flex:0 0 auto}
  .cd-date input{
    background:var(--surface-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:8px 10px; min-height:var(--tap); flex:1 1 auto; max-width:170px;
    color-scheme:dark;
  }
  @media (prefers-color-scheme: light){ .cd-date input{color-scheme:light} }
  .cd-season-bar{margin-top:4px}

  /* editable metric rows */
  .metric{display:flex; flex-direction:column; gap:6px; padding:10px 0; border-top:1px solid var(--line)}
  .metric:first-of-type{border-top:0}
  .metric .mtop{display:flex; align-items:center; gap:8px}
  .metric .mname{font-weight:700; font-size:14px; flex:1 1 auto}
  .metric .mpct{font-weight:800; font-size:13px; color:var(--accent); flex:0 0 auto; min-width:44px; text-align:right}
  .metric .minputs{display:flex; align-items:center; gap:6px; flex:0 0 auto}
  .metric .minputs input, .metric .minputs select{
    background:var(--surface-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:8px 8px; min-height:38px; text-align:right;
  }
  .metric .minputs input{width:66px}
  .metric .minputs select{text-align:left; max-width:150px}
  .metric .minputs input:focus, .metric .minputs select:focus, .cd-date input:focus{
    outline:2px solid var(--accent); outline-offset:1px}
  .metric .msep{color:var(--muted); font-size:12px}

  /* CC score summary */
  .cc-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .cc{display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:10px; padding:10px 6px}
  .cc b{font-size:20px; font-weight:900}
  .cc.hi b{color:var(--gold)}
  .cc small{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; text-align:center}

  /* ---------- Reward reference tables ---------- */
  .rewards{display:flex; flex-direction:column; gap:14px; margin-top:12px}
  .rtable{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .rtable > .rt-head{padding:11px 12px; border-bottom:1px solid var(--line)}
  .rtable > .rt-head h3{margin:0; font-size:14px; font-weight:800}
  .rtable > .rt-head p{margin:3px 0 0; font-size:11px; color:var(--muted); line-height:1.4}
  .rt-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch}
  table.rt{width:100%; border-collapse:collapse; font-size:13px; min-width:min-content}
  table.rt th, table.rt td{padding:8px 12px; text-align:left; white-space:nowrap}
  table.rt thead th{
    position:sticky; top:0; background:var(--surface-2); color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; font-weight:800;
    border-bottom:1px solid var(--line);
  }
  table.rt td.num, table.rt th.num{text-align:right; font-variant-numeric:tabular-nums}
  table.rt tbody tr:nth-child(even){background:var(--surface-2)}
  table.rt tbody tr.grp td{
    background:var(--surface); font-weight:800; color:var(--text);
    border-top:1px solid var(--line); font-size:11px; text-transform:uppercase; letter-spacing:.05em;
  }
  table.rt tbody td.pct{color:var(--ok); font-weight:700}
  .rt-note{color:var(--muted); font-size:11px; line-height:1.5; padding:2px 4px}
  .rt-empty{padding:16px 12px; color:var(--muted); font-size:13px; text-align:center}
  table.rt td.wrap{white-space:normal; min-width:170px; line-height:1.7}
  table.rt td.b{font-weight:800}

  /* five tabs — keep them on one row at mobile width */
  .tabs button{padding:10px 6px; font-size:14px}

  /* series badge + mini rarity badge */
  .badge.sr{background:var(--surface-2); color:var(--accent); border:1px solid var(--accent)}
  .badge.mini{padding:2px 5px; font-size:9px; margin-left:4px}
  @media (prefers-color-scheme: light){ .badge.sr{background:#e7effb} }

  /* collection filter/sort bar */
  .colbar{display:flex; gap:8px; margin:12px 2px 2px; flex-wrap:wrap}
  .colbar .cb{flex:1 1 140px; display:flex; align-items:center; gap:6px;
    background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:4px 6px 4px 12px}
  .colbar .cb>span{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:800; flex:0 0 auto}
  .colbar .cb select{flex:1 1 auto; background:transparent; color:var(--text); border:0; outline:none;
    padding:9px 6px; min-height:var(--tap); font-weight:700}
  .colbar .cb select:focus-visible{outline:2px solid var(--accent)}

  /* ---------- Tools tab ---------- */
  .tools{display:flex; flex-direction:column; gap:12px; margin-top:12px}
  .subnav{display:flex; gap:6px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:4px; position:sticky; top:0; z-index:5}
  .subnav button{flex:1; border:0; background:transparent; border-radius:9px; padding:10px;
    min-height:var(--tap); font-weight:700; color:var(--muted); font-size:14px}
  .subnav button[aria-selected="true"]{background:var(--surface-2); color:var(--text); border:1px solid var(--accent)}
  .subnav button:active{transform:scale(.98)}

  .delta{font-size:11px; font-weight:800; margin-left:4px}
  .delta.up{color:var(--ok)} .delta.down{color:var(--red)} .delta.flat{color:var(--muted)}
  .tag-boost{display:inline-block; margin-left:6px; font-size:9px; font-weight:900; color:var(--gold);
    border:1px solid var(--gold); border-radius:999px; padding:1px 6px; vertical-align:middle}

  /* suggested drivers */
  .sd-panel{padding:12px}
  .sd-panel h3{margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:800}
  .sd-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-top:1px solid var(--line)}
  .sd-row:first-of-type{border-top:0}
  .sd-rank{flex:0 0 auto; width:22px; height:22px; border-radius:6px; background:var(--surface-2);
    display:grid; place-items:center; font-size:12px; font-weight:900; color:var(--muted)}
  .sd-row:first-of-type .sd-rank{background:var(--gold); color:#0b0f1a}
  .sd-main{flex:1 1 auto; min-width:0; display:flex; flex-direction:column}
  .sd-name{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sd-sub{font-size:11px; color:var(--muted)}
  .sd-val{flex:0 0 auto; font-weight:800; font-size:16px; text-align:right; font-variant-numeric:tabular-nums}

  /* if-upgraded preview inside card details */
  .upg{margin:6px 0 2px; padding:8px; background:var(--surface-2); border:1px solid var(--line); border-radius:10px}
  .upg-h{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--accent); margin-bottom:6px}
  .upg-h .muted{text-transform:none; letter-spacing:0; font-weight:600}
  .upg .stats{margin:0}
  .boost-tog{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--muted);
    margin:2px 0 8px; min-height:32px; cursor:pointer}
  .boost-tog input{width:18px; height:18px; accent-color:var(--gold)}

  /* suggested loadouts */
  .lo-card{padding:12px}
  .lo-card h3{margin:0 0 8px; font-size:14px; font-weight:800; display:flex; align-items:center}
  .lo-card h3 .hint{margin-left:auto; font-size:11px; font-weight:600; color:var(--muted)}
  .lo-aggs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px}
  .lo-stat{font-size:12px; color:var(--muted); background:var(--surface-2); border:1px solid var(--line);
    border-radius:999px; padding:4px 10px}
  .lo-stat b{color:var(--text)}
  .lo-stat.hot{border-color:var(--accent); color:var(--text)}
  .lo-stat.hot b{color:var(--accent)}
  .lo-tot{font-size:12px; color:var(--text); margin-bottom:8px}
  .lo-tot b{font-weight:800}
  .lo-parts{display:grid; grid-template-columns:1fr; gap:4px}
  @media (min-width:460px){.lo-parts{grid-template-columns:1fr 1fr}}
  .lo-part{display:flex; justify-content:space-between; gap:8px; font-size:12px; padding:6px 8px;
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px}
  .lo-part>span:first-child{color:var(--muted); flex:0 0 auto}
  .lo-part>span:last-child{text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .lo-part.empty{opacity:.6}

  /* compare */
  .cmp-scope{display:flex; gap:6px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:4px; margin-bottom:10px}
  .cmp-scope button{flex:1; border:0; background:transparent; border-radius:9px; padding:9px;
    min-height:var(--tap); font-weight:700; color:var(--muted)}
  .cmp-scope button[aria-selected="true"]{background:var(--red); color:var(--red-ink)}
  table.rt.cmp th.sortable{cursor:pointer; user-select:none}
  table.rt.cmp th.sortable.active{color:var(--accent)}

/* ---------- State ---------- */
let overrides = {};        // { id: {level, amount} }
let tab = "drivers";       // "drivers" | "components" | "season" | "rewards"
let group = "All";         // active filter chip
let query = "";            // search text
let season = {};           // season dashboard state (see SEASON_DEFAULT)
let seriesFilter = "All";  // collection: filter by unlock Series
let sortBy = "default";    // collection: sort order
let toolView = "drivers";  // Tools tab sub-view: "drivers" | "loadouts" | "compare"
let cmpKind = "d";         // Compare scope: "d" drivers | "c" components
let cmpSort = {stat:"tot", dir:-1}; // Compare active sort
let boostedIds = {};       // { id: true } cards toggled to +10% boosted

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    // schema guard for safe future migrations
    if(data && typeof data === "object" && data.schema === SCHEMA && data.overrides){
      overrides = data.overrides;
    }
  }catch(e){ /* corrupt storage -> fall back to seed */ }
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      schema:SCHEMA, overrides, savedAt:new Date().toISOString()
    }));
  }catch(e){ toast("Couldn't save — storage full?"); }
}

/* ---------- Season state ---------- */
function loadSeason(){
  season = Object.assign({}, SEASON_DEFAULT);
  try{
    const raw = localStorage.getItem(SEASON_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data && typeof data === "object" && data.schema === SEASON_SCHEMA && data.state){
      // merge stored values over the seed so new fields stay defined
      season = Object.assign({}, SEASON_DEFAULT, data.state);
    }
  }catch(e){ /* corrupt storage -> keep seed */ }
}
function saveSeason(){
  try{
    localStorage.setItem(SEASON_KEY, JSON.stringify({
      schema:SEASON_SCHEMA, state:season, savedAt:new Date().toISOString()
    }));
  }catch(e){ toast("Couldn't save — storage full?"); }
}

/* ---------- Boosted (+10%) toggles ---------- */
function loadBoosted(){
  boostedIds = {};
  try{
    const raw = localStorage.getItem(BOOST_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data && typeof data === "object" && data.schema === BOOST_SCHEMA && data.ids){
      boostedIds = data.ids;
    }
  }catch(e){ /* corrupt storage -> none boosted */ }
}
function saveBoosted(){
  try{
    localStorage.setItem(BOOST_KEY, JSON.stringify({
      schema:BOOST_SCHEMA, ids:boostedIds, savedAt:new Date().toISOString()
    }));
  }catch(e){ toast("Couldn't save — storage full?"); }
}
function isBoosted(id){ return !!boostedIds[id]; }
function setBoosted(id, on){
  if(on) boostedIds[id] = true; else delete boostedIds[id];
  saveBoosted();
}

/* ---------- Season computation (mirrors the workbook's CC scoring) ---------- */
function ratio(cur, tgt){ if(!(tgt > 0)) return 0; return clamp(cur / tgt, 0, 1); }

    {key:"parts",     name:"Parts",           kind:"count", cur:season.parts[0],     tgt:season.parts[1]},
    {key:"partUpg",   name:"Part Upgrades",   kind:"count", cur:season.partUpg[0],   tgt:season.partUpg[1]},
    {key:"weekly",    name:"Weekly League",   kind:"pick",  opts:REWARDS.league.map(r=>r[0]),

    {key:"gpBest",    name:"GP Medal (Best)", kind:"pick",  opts:REWARDS.gpBest.map(r=>r[0]),
      val:season.gpBest, p:lookup(REWARDS.gpBest, season.gpBest) ?? 0},
    {key:"series",    name:"Highest Series",  kind:"pick",  opts:REWARDS.series.map(r=>r[0]),
      val:season.series, p:lookup(REWARDS.series, Number(season.series)) ?? 0},
    {key:"racesDone", name:"Races Done",      kind:"pick",  opts:REWARDS.races.map(r=>r[0]),
      val:season.racesDone, p:lookup(REWARDS.races, Number(season.racesDone)) ?? 0},
    {key:"racesWon",  name:"Races Won",       kind:"pick",  opts:REWARDS.wins.map(r=>r[0]),
      val:season.racesWon, p:lookup(REWARDS.wins, Number(season.racesWon)) ?? 0}
  ];
}
function metricPct(m){ return m.kind === "count" ? ratio(m.cur, m.tgt) : m.p; }
// "Potential" weight: count metrics assume the target is reached (weight 1);
// milestone metrics keep their current selection. Mirrors the workbook's
// CC Asset Tracker "Potential Completion" projection (cols E/F).
function metricPotential(m){ return m.kind === "count" ? (m.tgt > 0 ? 1 : 0) : m.p; }

// Derived CC score, computed exactly like the workbook. `potential` projects
// every count metric to its target.
function ccScore(potential){
  const ms = baseMetrics();
  const wf = potential ? metricPotential : metricPct;
  const base = ms.reduce((s,m)=> s + wf(m), 0) / ms.length;
  const rank = Math.floor(base * 100 / 5);          // 0..20
  const points = rank * 25;                          // 0..500
  const coinCC = lookup(REWARDS.coins, season.coins) ?? 0;
  const total = points + coinCC;                     // 0..650
  return { base, rank, points, coinCC, total };
}

// Days / progress for the season countdown (today is live).
function seasonTiming(){
  const day = 86400000;
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(season.seasonStart + "T00:00:00");
  const end   = new Date(season.seasonEnd + "T00:00:00");
  const validS = !isNaN(start), validE = !isNaN(end);
  const daysLeft = validE ? Math.max(0, Math.ceil((end - today)/day)) : null;
  let elapsed = 0;
  if(validS && validE && end > start){
    elapsed = clamp((today - start)/(end - start), 0, 1);
  }
  return { daysLeft, elapsed, valid: validS && validE };
}

/* ---------- Model helpers ---------- */
function idFor(tabName, groupName, seed){
  return (tabName === "drivers" ? "d:" : "c:") + groupName + ":" + seed.name;
}
// Effective card = seed + override, plus derived fields.
function effective(tabName, groupName, seed){
  const id = idFor(tabName, groupName, seed);
  const o = overrides[id] || {};
  const cap = CAP[seed.rarity] ?? 11;
  let level = Number.isFinite(o.level) ? o.level : seed.level;
  let amount = Number.isFinite(o.amount) ? o.amount : seed.amount;
  level = clamp(Math.round(level), 0, cap);
  amount = Math.max(0, Math.round(amount));
  return { id, k: tabName === "drivers" ? "d" : "c",
           name:seed.name, rarity:seed.rarity, group:groupName, level, amount, cap };
}
function clamp(n,lo,hi){ return Math.min(hi, Math.max(lo, n)); }

// Only persist values that differ from the seed (overrides).
function setOverride(id, seedLevel, seedAmount, patch){
  const cur = overrides[id] || {};
  const next = {
    level: patch.level !== undefined ? patch.level : (cur.level !== undefined ? cur.level : seedLevel),
    amount: patch.amount !== undefined ? patch.amount : (cur.amount !== undefined ? cur.amount : seedAmount)
  };
  if(next.level === seedLevel && next.amount === seedAmount){
    delete overrides[id];       // back to default -> drop override
  }else{
    overrides[id] = next;
  }
  save();
}

function groupsFor(tabName){
  return tabName === "drivers" ? DRIVER_GROUPS : COMPONENT_GROUPS;
}
function seedList(tabName, groupName){
  return DEFAULT[tabName][groupName] || [];
}

/* ---------- Rendering ---------- */
const app = document.getElementById("app");
const chipsEl = document.getElementById("chips");

function renderChips(){
  const groups = ["All", ...groupsFor(tab)];
  chipsEl.innerHTML = groups.map(g =>
    `<button class="chip" data-group="${esc(g)}" aria-pressed="${g===group}">${esc(g)}</button>`
  ).join("");
}

function pct(card){
  if(card.level >= card.cap) return null;      // MAX
  const cost = COST[card.level];
  if(!cost) return { p:0, cost:null };         // unknown cost (e.g. level 0)
  return { p: Math.min(card.amount / cost, 1), cost };
}

/* ----- Reference-data accessors + upgrade math ----- */
// Coins to go from `level` to `level+1` (null if unknown / at data cap).
function coinToNext(id, level){
  const r = REF[id]; if(!r) return null;
  return (level >= 1 && level < r.cu.length) ? r.cu[level] : null;
}
// Cards remaining to reach cap from current level, minus cards already banked.
function cardsToMax(level, cap, amount){
  let sum = 0;
  for(let k = level; k < cap; k++) sum += (COST[k] || 0);
  return Math.max(0, sum - Math.max(0, amount));
}
// Coins to reach cap from current level (null if this card has no cost data).
function coinsToMax(id, level, cap){
  const r = REF[id]; if(!r) return null;
  let sum = 0;
  for(let k = level; k < cap && k < r.cu.length; k++) sum += (r.cu[k] || 0);
  return sum;
}
// Tradeable surplus for a MAXED card: all cards on hand are surplus once a card
// is at its rarity cap, and every `unit` of them is worth one Asset Trade.
function tradesFor(c){
  if(c.level < c.cap) return null;              // only maxed cards have surplus
  const unit = TRADE[c.rarity] || 0;
  const surplus = Math.max(0, c.amount);
  return { surplus, unit, trades: unit ? Math.floor(surplus / unit) : 0 };
}
function surplusText(tr){
  if(!tr) return "";
  const t = tr.trades;
  return `${fmt(tr.surplus)} cards`
    + (tr.unit ? ` &middot; <span class="gold">${fmt(t)} trade${t===1?"":"s"}</span>`
                 + ` <span class="muted small">(&times;${fmt(tr.unit)})</span>` : "");
}

// Stats/Total/Team at a given level (null if none).
function statsAt(id, level){
  const r = REF[id]; if(!r || level < 1 || level > r.s.length) return null;
  return { names:r.n, vals:r.s[level-1], total:r.tot[level-1], team:r.team[level-1] };
}
// Data cap = highest level with published stats (may be below the rarity CAP).
function dataCap(id){ const r = REF[id]; return r ? r.s.length : 0; }
// Unlock series for a card (0/null = not via series progression, e.g. Legendary).
function seriesOf(id){ const r = REF[id]; return r && r.sr ? r.sr : null; }

/* Boosted (+10%) transform. The workbook models a per-card "boosted" slot as a
   flat Boost % (0.10). We scale each positive stat and Total/Team by 1.10 and
   round. Pit Time is left as-is (it's a lower-is-better duration, not scaled). */
function applyBoost(st){
  if(!st) return st;
  const vals = st.vals.map((v,i) =>
    st.names[i] === "Pit Time" ? v : Math.round(v * (1 + BOOST_PCT)));
  return { names:st.names, vals,
    total: Math.round(st.total * (1 + BOOST_PCT)),
    team:  Math.round(st.team  * (1 + BOOST_PCT)), boosted:true };
}
// Stats at a level, optionally boosted.
function statsView(id, level, boosted){
  const st = statsAt(id, level);
  return boosted ? applyBoost(st) : st;
}

// Preview the change from current level to the next (null if not previewable).
function upgradePreview(c){
  if(c.level >= c.cap) return null;
  const cur = statsAt(c.id, c.level);
  const next = statsAt(c.id, c.level + 1);
  if(!next) return null;                      // no data for the next level
  const cardCost = COST[c.level] || null;     // cards to reach next level
  const coinCost = coinToNext(c.id, c.level); // coins to reach next level
  const rows = next.names.map((n,i) => {
    const from = cur ? cur.vals[i] : 0;
    return { n, from, to:next.vals[i], d: next.vals[i] - from };
  });
  return {
    rows, toLevel:c.level + 1,
    totalFrom: cur ? cur.total : 0, totalTo: next.total,
    teamFrom: cur ? cur.team : 0, teamTo: next.team,
    cardCost, coinCost
  };
}

function progressHTML(c){
  const prog = pct(c);
  if(prog === null){
    const tr = tradesFor(c);
    const chip = tr && tr.trades > 0
      ? `<span class="trade">♻ ${fmt(tr.trades)} to trade</span>` : "";
    return `<div class="maxrow">★ MAX ${chip}<span class="muted" style="margin-left:auto">Lv ${c.cap}</span></div>`;
  }
  const w = Math.round(prog.p * 100);
  const coin = coinToNext(c.id, c.level);
  const cardPart = prog.cost ? `${fmt(Math.min(c.amount,prog.cost))} / ${fmt(prog.cost)} cards`
                             : `${fmt(c.amount)} cards`;
  const coinPart = coin ? ` &middot; ${fmtCoins(coin)} coins` : "";
  return `<div class="barwrap">
      <div class="bar"><i style="width:${w}%"></i></div>
      <div class="barlabel"><span>To Lv ${c.level+1}</span><span>${cardPart}${coinPart}</span></div>
    </div>`;
}

// Compact "if upgraded" preview: per-stat delta + new Total/Team + cost.
function upgradeHTML(c){
  const up = upgradePreview(c);
  if(!up) return "";
  const items = up.rows
    .filter(x => c.k === "d" || x.to || x.from)      // components: hide unused stats
    .map(x => {
      const sign = x.d > 0 ? "+" : "";
      const cls = x.d > 0 ? "up" : (x.d < 0 ? "down" : "flat");
      const dtxt = x.d === 0 ? "±0" : `${sign}${fmtNum(x.d)}`;
      return `<div class="stat"><span>${esc(x.n)}</span>
        <b>${fmtNum(x.to)} <span class="delta ${cls}">${dtxt}</span></b></div>`;
    }).join("");
  const tD = up.totalTo - up.totalFrom, mD = up.teamTo - up.teamFrom;
  const costTxt = (up.cardCost!=null ? `${fmt(up.cardCost)} cards` : "")
    + (up.coinCost!=null ? ` &middot; ${fmtCoins(up.coinCost)} coins` : "");
  return `<div class="upg">
    <div class="upg-h">If upgraded to Lv ${up.toLevel}${costTxt?` <span class="muted">${costTxt}</span>`:""}</div>
    <div class="stats">${items}</div>
    <div class="stat total"><span>Total / Team Score</span>
      <b>${fmt(up.totalTo)} / ${fmt(up.teamTo)}
      <span class="delta ${tD>=0?'up':'down'}">${tD>=0?'+':''}${tD} / ${mD>=0?'+':''}${mD}</span></b></div>
  </div>`;
}

// Collapsible stats + "to max" plan panel.
function detailsHTML(c){
  const boosted = isBoosted(c.id);
  const st = statsView(c.id, c.level, boosted);
  const toMaxCards = cardsToMax(c.level, c.cap, c.amount);
  const toMaxCoins = coinsToMax(c.id, c.level, c.cap);
  const atMax = c.level >= c.cap;
  const hasData = !!statsAt(c.id, c.level);

  let statRows = "";
  if(st){
    const items = st.names
      .map((n,i) => ({n, v:st.vals[i]}))
      .filter(x => c.k === "d" || x.v);           // components: show only used stats
    statRows = `<div class="stats">` + items.map(x =>
      `<div class="stat"><span>${esc(x.n)}</span><b>${fmtNum(x.v)}</b></div>`).join("") + `</div>`;
    statRows += `<div class="stat total"><span>Total / Team Score</span><b>${fmt(st.total)} / ${fmt(st.team)}</b></div>`;
  }else if(!REF[c.id]){
    statRows = `<div class="muted small">Stat data not published for this component in the source sheet.</div>`;
  }else{
    statRows = `<div class="muted small">No stats yet — unlock this card to see them.</div>`;
  }

  // Optional "boosted" (+10%) toggle — only meaningful when stats exist.
  const boostToggle = hasData ? `<label class="boost-tog">
      <input type="checkbox" data-act="boost" ${boosted?"checked":""}
        aria-label="Boosted +10% for ${esc(c.name)}"> Boosted +10%
    </label>` : "";

  const planRows = `<div class="plan">
    ${atMax ? `<div class="planrow"><span>Status</span><b class="gold">★ Maxed</b></div>
               <div class="planrow"><span>Surplus to trade</span><b class="surplus-val">${surplusText(tradesFor(c))}</b></div>`
            : `<div class="planrow"><span>To max (Lv ${c.cap})</span><b>${fmt(toMaxCards)} cards${toMaxCoins!=null?` &middot; ${fmtCoins(toMaxCoins)} coins`:""}</b></div>`}
  </div>`;

  return `<details class="det">
    <summary>Stats &amp; costs</summary>
    ${boostToggle}${statRows}${upgradeHTML(c)}${planRows}
  </details>`;
}

function cardInner(c){
  const sr = seriesOf(c.id);
  const srBadge = sr ? `<span class="badge sr" title="Unlocks in Series ${sr}">S${sr}</span>` : "";
  return `<div class="top">

function cardHTML(c){

// Rebuild a live card object from its DOM dataset (for in-place refresh).
function cardFromEl(card){
  const id = card.dataset.id;
  return {
    id, k: card.dataset.kind,

// Show/hide the search box and filter chips depending on the active tab.
function updateChrome(){
  const searchEl = document.querySelector(".search");
  const isCollection = tab === "drivers" || tab === "components";
  chipsEl.style.display = isCollection ? "" : "none";
  // Search filters collection cards, reward tables and Tools views — not Season.
  searchEl.style.display = (tab === "season") ? "none" : "";
  const searchInput = document.getElementById("search");
  if(tab === "rewards") searchInput.placeholder = "Search boosts & tables…";
  else if(tab === "tools") searchInput.placeholder = "Search cards…";
  else searchInput.placeholder = "Search by name…";
}

// Sort comparators for the collection, keyed by sortBy.
function sortCards(cards){
  const byStat = (c, key) => {
    const st = statsAt(c.id, c.level);
    if(!st) return -1;
    if(key === "tot") return st.total;
    if(key === "team") return st.team;
    return st.total;
  };
  const cmp = {
    series:   (a,b) => (seriesOf(a.id)||99) - (seriesOf(b.id)||99) || a.name.localeCompare(b.name),
    level:    (a,b) => b.level - a.level || a.name.localeCompare(b.name),
    total:    (a,b) => byStat(b,"tot") - byStat(a,"tot"),
    team:     (a,b) => byStat(b,"team") - byStat(a,"team"),
    name:     (a,b) => a.name.localeCompare(b.name)
  }[sortBy];
  if(cmp) cards.sort(cmp);
  return cards;
}

// Filter/sort control bar for collection tabs.
function collectionBar(){
  const seriesVals = [...new Set(Object.keys(REF)
    .filter(k => k[0] === (tab === "drivers" ? "d" : "c"))
    .map(k => REF[k].sr).filter(Boolean))].sort((a,b)=>a-b);
  const srOpts = ["All", ...seriesVals]
    .map(v => `<option value="${v}"${String(v)===String(seriesFilter)?" selected":""}>${v==="All"?"All series":"Series "+v}</option>`).join("");
  const sorts = [["default","Default"],["series","Series"],["level","Level ↓"],
    ["total","Total ↓"],["team","Team ↓"],["name","Name A–Z"]];
  const sortOpts = sorts.map(([v,l]) =>
    `<option value="${v}"${v===sortBy?" selected":""}>${l}</option>`).join("");
  return `<div class="colbar">
    <label class="cb"><span>Series</span>
      <select data-cb="series" aria-label="Filter by series">${srOpts}</select></label>
    <label class="cb"><span>Sort</span>
      <select data-cb="sort" aria-label="Sort cards">${sortOpts}</select></label>
  </div>`;
}

function render(){
  updateChrome();
  if(tab === "season"){ renderSeason(); return; }
  if(tab === "rewards"){ renderRewards(); return; }
  if(tab === "tools"){ renderTools(); return; }
  renderChips();
  const groups = groupsFor(tab);
  const active = group === "All" ? groups : [group];
  const q = query.trim().toLowerCase();
  const sf = seriesFilter === "All" ? null : Number(seriesFilter);
  let html = "";
  let total = 0;

  for(const g of active){
    let cards = seedList(tab, g)
      .map(seed => {
        const e = effective(tab, g, seed);
        e.seedLevel = seed.level; e.seedAmount = seed.amount;
        return e;
      })
      .filter(c => !q || c.name.toLowerCase().includes(q))
      .filter(c => sf == null || seriesOf(c.id) === sf);
    if(!cards.length) continue;
    if(sortBy !== "default") cards = sortCards(cards);
    total += cards.length;
    html += `<section class="group"><h2>${esc(g)}<span class="count">${cards.length}</span></h2>
      <div class="cards">${cards.map(cardHTML).join("")}</div></section>`;
  }

  const bar = collectionBar();
  app.innerHTML = summaryHTML() + bar + html + toolbarHTML();
  if(total === 0){
    app.innerHTML = summaryHTML() + bar + `<div class="empty">No cards match your filters.</div>` + toolbarHTML();
  }
}

// Collection-wide "to max" totals for the ACTIVE tab (ignores search/filter).
function tabTotals(){
  let cards = 0, coins = 0, maxed = 0, count = 0, surplus = 0, trades = 0;
  for(const g of groupsFor(tab)){
    for(const seed of seedList(tab, g)){
      const c = effective(tab, g, seed);
      count++;
      if(c.level >= c.cap){
        maxed++;
        const unit = TRADE[c.rarity] || 0;
        surplus += c.amount;
        if(unit) trades += Math.floor(c.amount / unit);
        continue;
      }
      cards += cardsToMax(c.level, c.cap, c.amount);
      const cn = coinsToMax(c.id, c.level, c.cap);
      if(cn != null) coins += cn;
    }
  }
  return { cards, coins, maxed, count, surplus, trades };
}

function summaryHTML(){
  const t = tabTotals();
  const label = tab === "drivers" ? "Drivers" : "Components";
  const tradeLine = (t.surplus > 0)
    ? `<div class="sum-trade">♻ ${fmt(t.surplus)} surplus cards &middot;
         <b>${fmt(t.trades)}</b> asset trade${t.trades===1?"":"s"} available</div>` : "";
  return `<div class="summary" id="summary">
    <div class="sum-title">${label} · to max everything</div>
    <div class="sum-grid">
      <div class="sum"><b>${fmt(t.cards)}</b><small>cards left</small></div>
      <div class="sum"><b>${fmtCoins(t.coins)}</b><small>coins left</small></div>
      <div class="sum"><b>${t.maxed}/${t.count}</b><small>maxed</small></div>
    </div>
    ${tradeLine}
  </div>`;
}

function updateSummary(){
  const el = document.getElementById("summary");
  if(el) el.outerHTML = summaryHTML();
}

// Live-patch the season derived figures without disturbing focused inputs.
function refreshSeason(){
  const ms = baseMetrics();
  const t = seasonTiming();
  const cc = ccScore();
  ms.forEach(m => {
    const row = document.querySelector(`.metric[data-mkey="${m.key}"]`);
    if(!row) return;
    const p = Math.round(metricPct(m) * 100);
    const bar = row.querySelector(".bar > i"); if(bar) bar.style.width = p + "%";
    const pct = row.querySelector(".mpct"); if(pct) pct.textContent = p + "%";
  });
  const pot = ccScore(true);
  const setW = (id, w) => { const el = document.getElementById(id); if(el) el.style.width = w; };
  const setT = (id, txt) => { const el = document.getElementById(id); if(el) el.innerHTML = txt; };
  setT("cc-base", Math.round(cc.base*100) + "%");
  setT("cc-rank", cc.rank + '<span class="muted small"> / 20</span>');
  setT("cc-points", fmt(cc.points) + '<span class="muted small"> / 500</span>');
  setT("cc-total", fmt(cc.total) + '<span class="muted small"> / 650</span>');
  setT("cc-base-p", "▲ " + Math.round(pot.base*100) + "%");
  setT("cc-rank-p", "▲ " + pot.rank);
  setT("cc-points-p", "▲ " + fmt(pot.points));
  setT("cc-total-p", "▲ " + fmt(pot.total));
  // countdown + elapsed
  const big = document.querySelector(".cd-big b");
  if(big) big.textContent = t.daysLeft == null ? "—" : fmt(t.daysLeft);
  const eBar = document.querySelector(".cd-season-bar .bar > i");
  if(eBar) eBar.style.width = Math.round(t.elapsed*100) + "%";
  setT("s-elapsed", Math.round(t.elapsed*100) + "%");
}

// Every owned & leveled card of a kind ("d" drivers | "c" components),
// as effective() objects with a level >= 1 that has published stats.
function ownedCards(kind){
  const out = [];
  const tabName = kind === "d" ? "drivers" : "components";
  for(const g of groupsFor(tabName))
    for(const seed of seedList(tabName, g)){
      const c = effective(tabName, g, seed);
      if(c.level >= 1 && statsAt(c.id, c.level)) out.push(c);
    }
  return out;
}

const DRIVER_STAT_LABELS = ["Overtaking","Defending","Qualifying","Race Start","Tyre Mgmt"];

function suggestDriversHTML(q){

  }

    return { c, st, up };

  const panels = DRIVER_STAT_LABELS.map((label, i) => {

      return `<div class="sd-row">

  }).join("");

/* ----- 4) Suggested Loadouts: best owned component per category, per strategy ----- */
const LOADOUT_STRATS = [
  {n:"Speed",                        t:["Speed"]},
  {n:"Speed + Qualifying",           t:["Speed","Qualifying"]},
  {n:"Cornering",                    t:["Cornering"]},
  {n:"Cornering + Qualifying",       t:["Cornering","Qualifying"]},
  {n:"Power Unit",                   t:["Power Unit"]},
  {n:"Power Unit + Qualifying",      t:["Power Unit","Qualifying"]},
  {n:"Speed + Cornering",            t:["Speed","Cornering"]},
  {n:"Speed + Cornering + Qualifying", t:["Speed","Cornering","Qualifying"]},
  {n:"Qualifying",                   t:["Qualifying"]}
];
// Aggregate stat labels shown for a loadout (component stats, in sheet order).
const CAR_STATS = ["Speed","Cornering","Power Unit","Qualifying","Pit Time"];

function bestLoadout(strat){
  const picks = [];
  const agg = {}; let total = 0, team = 0, count = 0;
  for(const g of COMPONENT_GROUPS){
    let best = null, bestScore = -Infinity, bestSt = null, bestUp = null;
    for(const seed of seedList("components", g)){
      const c = effective("components", g, seed);
      if(c.level < 1) continue;                       // must own it
      const st = statsView(c.id, c.level, isBoosted(c.id));
      if(!st) continue;
      const score = strat.t.reduce((s,tn) => s + (st.vals[st.names.indexOf(tn)] || 0), 0);
      if(score > bestScore){
        bestScore = score; best = c; bestSt = st;
        bestUp = c.level < c.cap ? statsView(c.id, c.level + 1, isBoosted(c.id)) : null;
      }
    }
    if(best){
      picks.push({group:g, c:best, st:bestSt, up:bestUp});
      bestSt.names.forEach((n,i) => { agg[n] = (agg[n] || 0) + bestSt.vals[i]; });
      total += bestSt.total; team += bestSt.team; count++;
    }else{
      picks.push({group:g, c:null});
    }
  }
  // "If upgraded" aggregate = each chosen part one level higher (where possible).
  let upTotal = 0, upTeam = 0;
  picks.forEach(p => { if(p.c){ const s = p.up || p.st; upTotal += s.total; upTeam += s.team; } });
  return {picks, agg, total, team, upTotal, upTeam, count};
}

function suggestLoadoutsHTML(q){
  const strats = LOADOUT_STRATS.filter(s => !q || s.n.toLowerCase().includes(q));
  if(!ownedCards("c").length){
    return `<div class="empty">No leveled components yet. Set some part levels on the Parts tab to build loadouts.</div>`;
  }
  if(!strats.length) return `<div class="empty">No strategy matches “${esc(query)}”.</div>`;
  const cards = strats.map(strat => {
    const lo = bestLoadout(strat);
    const aggChips = CAR_STATS.map(n => {
      const hot = strat.t.includes(n);
      return `<span class="lo-stat${hot?' hot':''}">${esc(n)} <b>${fmtNum(Math.round((lo.agg[n]||0)*100)/100)}</b></span>`;
    }).join("");
    const parts = lo.picks.map(p => {
      if(!p.c) return `<div class="lo-part empty"><span>${esc(p.group)}</span><span class="muted">— none owned —</span></div>`;
      const boost = isBoosted(p.c.id) ? `<span class="tag-boost">+10%</span>` : "";
      return `<div class="lo-part"><span>${esc(p.group)}</span>
        <span><b>${esc(p.c.name)}</b>${boost} <span class="muted">Lv ${p.c.level}</span></span></div>`;
    }).join("");
    const upT = lo.upTotal - lo.total, upM = lo.upTeam - lo.team;
    return `<div class="panel lo-card">
      <h3>${esc(strat.n)}<span class="hint">${lo.count}/7 parts</span></h3>
      <div class="lo-aggs">${aggChips}</div>
      <div class="lo-tot">Total <b>${fmt(lo.total)}</b> · Team <b>${fmt(lo.team)}</b>
        <span class="muted">· if each part +1 lvl → ${fmt(lo.upTotal)} <span class="delta up">+${upT}</span> / ${fmt(lo.upTeam)} <span class="delta up">+${upM}</span></span></div>
      <div class="lo-parts">${parts}</div>
    </div>`;
  }).join("");
  return `<div class="rt-note">Best loadout from <b>your owned components</b> for each strategy — one part per
    category, chosen to maximise the strategy’s stat(s) at current levels. (The workbook’s per-Series/GP picks are
    formula-driven off the author’s own collection, so these are computed live from yours instead.)</div>${cards}`;
}

/* ----- 5) Compare: sortable side-by-side table at current levels ----- */
function compareHTML(q){
  const kind = cmpKind;
  const cards = ownedCards(kind).filter(c => !q || c.name.toLowerCase().includes(q));
  const statNames = kind === "d"
    ? ["overtaking","defending","qualifying","raceStart","tyreUse"]
    : ["Speed","Cornering","Power Unit","Qualifying","Pit Time","Overtake M","Impact","Duration","Recharge"];
  const shortLabels = kind === "d"
    ? ["Over","Def","Qual","Start","Tyre"]
    : ["Spd","Cor","PU","Qual","Pit","OvM","Imp","Dur","Rch"];

  const scope = `<div class="cmp-scope">
    <button data-ck="d" aria-selected="${kind==='d'}">Drivers</button>
    <button data-ck="c" aria-selected="${kind==='c'}">Components</button>
  </div>`;

  if(!cards.length){
    return scope + `<div class="empty">No leveled ${kind==='d'?'drivers':'components'}${q?" match your search":""} to compare.</div>`;
  }

  const rows = cards.map(c => {
    const st = statsView(c.id, c.level, isBoosted(c.id));
    return { c, vals:st.vals, total:st.total, team:st.team, sr:seriesOf(c.id) || 99 };
  });
  // sort
  const s = cmpSort;
  rows.sort((a,b) => {
    let av, bv;
    if(s.stat === "name") return s.dir * a.c.name.localeCompare(b.c.name);
    if(s.stat === "lvl"){ av=a.c.level; bv=b.c.level; }
    else if(s.stat === "sr"){ av=a.sr; bv=b.sr; }
    else if(s.stat === "tot"){ av=a.total; bv=b.total; }
    else if(s.stat === "team"){ av=a.team; bv=b.team; }
    else { const i=+s.stat.slice(1); av=a.vals[i]; bv=b.vals[i]; }
    return s.dir * (av - bv) || a.c.name.localeCompare(b.c.name);
  });

  const arrow = (key) => s.stat === key ? (s.dir < 0 ? " ▾" : " ▴") : "";
  const th = (key, label, cls) =>
    `<th class="${cls||''} sortable${s.stat===key?' active':''}" data-cs="${key}">${label}${arrow(key)}</th>`;
  const head = `<tr>
    ${th("name","Name")}
    ${th("lvl","Lv","num")}
    ${th("sr","S","num")}
    ${statNames.map((n,i)=>th("s"+i, shortLabels[i], "num")).join("")}
    ${th("tot","Tot","num")}
    ${th("team","Team","num")}
  </tr>`;
  const body = rows.map(r => `<tr>
    <td class="cmp-name">${esc(r.c.name)} <span class="badge ${esc(r.c.rarity)} mini">${esc(r.c.rarity[0])}</span>${isBoosted(r.c.id)?'<span class="tag-boost">+10%</span>':''}</td>
    <td class="num">${r.c.level}</td>
    <td class="num">${r.sr===99?"—":r.sr}</td>
    ${r.vals.map(v=>`<td class="num">${fmtNum(v)}</td>`).join("")}
    <td class="num b">${fmt(r.total)}</td>
    <td class="num b">${fmt(r.team)}</td>
  </tr>`).join("");

  return scope + `<div class="rt-note">Your ${kind==='d'?'drivers':'components'} at their current levels. Tap any
    column header to sort. Scroll the table sideways for more stats.</div>
    <div class="rtable"><div class="rt-scroll"><table class="rt cmp">
      <thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
}

// Filter reward blocks (and their rows) by the search text.
function filterRewards(q){
  const wrap = document.getElementById("rewards");
  if(!wrap) return;
  let anyVisible = false;
  wrap.querySelectorAll(".rtable").forEach(tbl => {
    const titleMatch = (tbl.dataset.text || "").includes(q);
    let rowsShown = 0;
    tbl.querySelectorAll("tbody tr").forEach(tr => {
      const hit = titleMatch || tr.textContent.toLowerCase().includes(q);
      tr.style.display = hit ? "" : "none";
      if(hit) rowsShown++;
    });
    const show = titleMatch || rowsShown > 0;
    tbl.style.display = show ? "" : "none";
    if(show) anyVisible = true;
  });
  let empty = wrap.querySelector(".rt-empty");
  if(!anyVisible){
    if(!empty){
      empty = document.createElement("div");
      empty.className = "rt-empty";
      wrap.prepend(empty);
    }
    empty.textContent = `No reward data matches “${query}”.`;
    empty.style.display = "";
  }else if(empty){ empty.style.display = "none"; }
}

/* ---------- Interactions ---------- */
app.addEventListener("click", (e) => {
  // Tools sub-nav
  const tv = e.target.closest("[data-tv]");
  if(tv){ if(toolView !== tv.dataset.tv){ toolView = tv.dataset.tv; render(); } return; }
  // Compare scope (drivers/components)
  const ck = e.target.closest("[data-ck]");
  if(ck){ if(cmpKind !== ck.dataset.ck){ cmpKind = ck.dataset.ck; cmpSort = {stat:"tot", dir:-1}; render(); } return; }
  // Compare column sort
  const cs = e.target.closest("[data-cs]");
  if(cs){
    const key = cs.dataset.cs;
    if(cmpSort.stat === key) cmpSort.dir *= -1;
    else cmpSort = {stat:key, dir: key === "name" ? 1 : -1};
    render();
    return;
  }

  const btn = e.target.closest("[data-act], [data-tool]");
  if(!btn) return;
  const tool = btn.dataset.tool;
  if(tool){ handleTool(tool); return; }

  const card = btn.closest(".card");
  if(!card) return;
  const act = btn.dataset.act;
  if(act === "inc" || act === "dec"){
    const cap = +card.dataset.cap;
    let level = clamp(+card.dataset.level + (act==="inc"?1:-1), 0, cap);
    setOverride(card.dataset.id, +card.dataset.seedlevel, +card.dataset.seedamount, {level});
    updateCard(card);
  }
});

// Card count edits (debounced persistence on change/blur).
app.addEventListener("input", (e) => {
  const input = e.target.closest('input[data-act="amt"]');
  if(!input) return;
  const card = input.closest(".card");
  let amount = Math.max(0, Math.floor(+input.value || 0));
  setOverride(card.dataset.id, +card.dataset.seedlevel, +card.dataset.seedamount, {amount});
  card.dataset.amount = amount;
  refreshAmount(card);      // live update without stealing input focus
});
app.addEventListener("change", (e) => {
  const input = e.target.closest('input[data-act="amt"]');
  if(!input) return;
  input.value = Math.max(0, Math.floor(+input.value || 0));  // normalize display
});

// Per-card "boosted" (+10%) toggle: persist + rebuild the card body.
app.addEventListener("change", (e) => {
  const cb = e.target.closest('input[data-act="boost"]');
  if(!cb) return;
  const card = cb.closest(".card");
  setBoosted(card.dataset.id, cb.checked);
  updateCard(card);
});

// Collection filter/sort bar (Series filter + Sort order).
app.addEventListener("change", (e) => {
  const sel = e.target.closest("[data-cb]");
  if(!sel) return;
  if(sel.dataset.cb === "series") seriesFilter = sel.value;
  else if(sel.dataset.cb === "sort") sortBy = sel.value;
  render();
});

/* ---------- Season inputs ---------- */
function applySeasonField(el){
  const key = el.dataset.skey;
  if(!key) return;
  if(key === "drivers" || key === "driverUpg" || key === "parts" || key === "partUpg"){
    const arr = season[key].slice();
    arr[+el.dataset.part] = Math.max(0, Math.floor(+el.value || 0));
    season[key] = arr;
  }else if(key === "gpTotal"){
    season[key] = Math.max(0, Math.floor(+el.value || 0));
  }else if(key === "series" || key === "racesDone" || key === "racesWon"){
    season[key] = Number(el.value);
  }else{ // weekly, gpBest, coins, seasonStart, seasonEnd
    season[key] = el.value;
  }
  saveSeason();
}
app.addEventListener("input", (e) => {
  const el = e.target.closest("[data-skey]");
  if(!el) return;
  applySeasonField(el);
  refreshSeason();       // patch derived figures, keep input focus
});
app.addEventListener("change", (e) => {
  const el = e.target.closest("[data-skey]");
  if(!el) return;
  applySeasonField(el);
  // discrete controls: full re-render keeps derived labels (coin note) in sync
  if(el.tagName === "SELECT" || el.type === "date") renderSeason();
  else refreshSeason();
});

// After a LEVEL change: fully rebuild the card body (level changes stats,
// progress and plan). Preserve the details panel's open state.
function updateCard(card){
  const id = card.dataset.id;
  const o = overrides[id] || {};
  const cap = +card.dataset.cap;
  const level = clamp(Number.isFinite(o.level)?o.level:+card.dataset.seedlevel, 0, cap);
  const amount = Number.isFinite(o.amount)?o.amount:+card.dataset.seedamount;
  card.dataset.level = level; card.dataset.amount = amount;
  const wasOpen = card.querySelector(".det") && card.querySelector(".det").open;
  card.innerHTML = cardInner(cardFromEl(card));
  if(wasOpen){ const d = card.querySelector(".det"); if(d) d.open = true; }
  card.classList.toggle("dim", level===0 && amount===0);
  updateSummary();
}

// After an AMOUNT edit: patch only the figures that depend on card count,
// so the numeric input keeps focus and the details panel stays open.
function refreshAmount(card){
  const c = cardFromEl(card);
  const prog = pct(c);
  const bw = card.querySelector(".barwrap");
  if(prog && bw){
    const i = bw.querySelector(".bar > i");
    if(i) i.style.width = Math.round(prog.p*100) + "%";
    const coin = coinToNext(c.id, c.level);
    const cardPart = prog.cost ? `${fmt(Math.min(c.amount,prog.cost))} / ${fmt(prog.cost)} cards`
                               : `${fmt(c.amount)} cards`;
    const coinPart = coin ? ` &middot; ${fmtCoins(coin)} coins` : "";
    const lbl = bw.querySelector(".barlabel span:last-child");
    if(lbl) lbl.innerHTML = cardPart + coinPart;
  }
  if(c.level < c.cap){
    const planB = card.querySelector(".plan .planrow b");
    if(planB){
      const toMaxCoins = coinsToMax(c.id, c.level, c.cap);
      planB.innerHTML = `${fmt(cardsToMax(c.level, c.cap, c.amount))} cards`
        + (toMaxCoins!=null ? ` &middot; ${fmtCoins(toMaxCoins)} coins` : "");
    }
  }else{
    // maxed card: patch the surplus/trades figures live
    const tr = tradesFor(c);
    const sv = card.querySelector(".surplus-val");
    if(sv) sv.innerHTML = surplusText(tr);
    const maxrow = card.querySelector(".maxrow");
    if(maxrow){
      let chip = maxrow.querySelector(".trade");
      if(tr && tr.trades > 0){
        if(!chip){
          chip = document.createElement("span");
          chip.className = "trade";
          maxrow.insertBefore(chip, maxrow.querySelector(".muted"));
        }
        chip.innerHTML = `♻ ${fmt(tr.trades)} to trade`;
      }else if(chip){ chip.remove(); }
    }
  }
  card.classList.toggle("dim", c.level===0 && c.amount===0);
  updateSummary();
}

/* ---------- Tools: export / import / reset ---------- */
function handleTool(tool){
  if(tool === "export") exportData();
  else if(tool === "import") document.getElementById("importFile").click();
  else if(tool === "reset") resetData();
}

function exportData(){
  const payload = { schema:SCHEMA, overrides, savedAt:new Date().toISOString(),
    app:"F1 Clash Resource Sheet", version:"v1" };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `f1clash-backup-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("Backup exported");
}

document.getElementById("importFile").addEventListener("change", function(){
  const file = this.files && this.files[0];
  this.value = "";
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data || typeof data !== "object" || !data.overrides || typeof data.overrides !== "object"){
        throw new Error("bad");
      }
      if(data.schema !== SCHEMA){
        if(!confirm(`Backup schema (${data.schema}) differs from this app (${SCHEMA}). Import anyway?`)) return;
      }
      overrides = data.overrides;
      save();
      render();
      toast("Backup imported");
    }catch(e){
      toast("Import failed — invalid file");
    }
  };
  reader.readAsText(file);
});

function resetData(){
  if(!confirm("Reset all levels and card counts back to the built-in defaults? This can't be undone.")) return;
  overrides = {};
  save();
  render();
  toast("Reset to defaults");
}

/* ---------- Header controls ---------- */
document.querySelectorAll(".tabs button").forEach(b => {
  b.addEventListener("click", () => {
    if(tab === b.dataset.tab) return;
    tab = b.dataset.tab; group = "All"; seriesFilter = "All"; sortBy = "default";
    document.querySelectorAll(".tabs button").forEach(x =>
      x.setAttribute("aria-selected", x===b ? "true" : "false"));
    render();
    window.scrollTo({top:0});
  });
});

chipsEl.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if(!chip) return;
  group = chip.dataset.group;
  render();
});

const searchEl = document.getElementById("search");
const clearEl = document.getElementById("clear");
searchEl.addEventListener("input", () => {
  query = searchEl.value;
  clearEl.hidden = !query;
  render();
});
clearEl.addEventListener("click", () => {
  searchEl.value = ""; query = ""; clearEl.hidden = true; render(); searchEl.focus();
});

/* ---------- Install prompt ---------- */
let deferredPrompt = null;
const installBtn = document.getElementById("install");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add("show");
});
installBtn.addEventListener("click", async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.classList.remove("show");
});
window.addEventListener("appinstalled", () => {
  installBtn.classList.remove("show");
  deferredPrompt = null;
  toast("Installed");
});

/* ---------- Toast ---------- */
let toastTimer = null;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* ---------- Utils ---------- */
function esc(s){ return String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(n){ return Number(n).toLocaleString("en-US"); }
// Like fmt but keeps up to 2 decimals for non-integers (e.g. Pit Time 0.69).
function fmtNum(n){
  n = Number(n);
  if(Number.isInteger(n)) return n.toLocaleString("en-US");
  return (Math.round(n*100)/100).toLocaleString("en-US", {maximumFractionDigits:2});
}
// Compact coin formatting: 12,500,000 -> "12.5M", 1,226,300,000 -> "1.23B".
function fmtCoins(n){
  n = Number(n) || 0;
  const sign = n < 0 ? "-" : ""; n = Math.abs(n);
  const trim = (x) => x.toFixed(2).replace(/\.?0+$/, "");
  if(n >= 1e9) return sign + trim(n/1e9) + "B";
  if(n >= 1e6) return sign + trim(n/1e6) + "M";
  if(n >= 1e3) return sign + trim(n/1e3) + "K";
  return sign + n.toLocaleString("en-US");
}

loadSeason();
loadBoosted();

    navigator.serviceWorker.register("sw.js").catch(()=>{ /* offline-first still works after first cache */ });
  });
